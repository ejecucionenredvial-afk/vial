<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificación Vial · Lanús</title>
<style>
  :root{
    --azul:#1a3a5c;
    --azul2:#2c5f8a;
    --verde:#166534;
    --amarillo:#7a5c00;
    --gris:#f3f4f6;
    --borde:#e2e8f0;
    --texto:#1b2430;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#eef1f4;min-height:100vh;}

  /* HEADER */
  .hdr{background:var(--azul);color:#fff;padding:14px 18px 12px;display:flex;align-items:center;gap:14px;}
  .hdr-logo{height:40px;width:auto;}
  .hdr-info{flex:1;}
  .hdr-title{font-size:15px;font-weight:700;letter-spacing:.2px;}
  .hdr-sub{font-size:11.5px;opacity:.75;margin-top:2px;}
  .hdr-fecha{font-size:11px;opacity:.6;margin-top:3px;}

  /* CONTROLES */
  .controls{background:#fff;border-bottom:1px solid var(--borde);padding:12px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .controls label{font-size:12.5px;font-weight:600;color:#445;}
  input[type=date]{padding:7px 10px;border:1px solid var(--borde);border-radius:6px;font-size:13px;color:var(--texto);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
  .btn-p{background:var(--azul);color:#fff;}
  .btn-p:hover{background:var(--azul2);}
  .btn-wa{background:#25d366;color:#fff;}
  .btn-wa:hover{background:#1ebe5d;}
  .btn-resumen{background:#7c3aed;color:#fff;}
  .btn-resumen:hover{background:#6d28d9;}
  .stat{font-size:12px;color:#667;margin-left:auto;}

  /* LOADING */
  .loading{text-align:center;padding:60px 20px;color:#aaa;font-size:14px;}

  /* CUADRILLA CARD */
  .cuadrilla-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin:14px 14px 0;overflow:hidden;}
  .cuadrilla-header{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--borde);}
  .cuadrilla-nombre{font-size:13.5px;font-weight:700;color:var(--azul);}
  .cuadrilla-count{font-size:11.5px;color:#667;margin-left:auto;}

  /* ENTRADA */
  .entrada{padding:10px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:10px;}
  .entrada:last-child{border-bottom:none;}
  .estado-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .dot-pendiente{background:#9ca3af;}
  .dot-incompleta{background:#f59e0b;}
  .dot-terminada{background:#22c55e;}
  .entrada-dir{font-size:13px;color:var(--texto);flex:1;line-height:1.4;}
  .entrada-estado{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;flex-shrink:0;}
  .est-pendiente{background:#f3f4f6;color:#555;}
  .est-incompleta{background:#fff3cd;color:var(--amarillo);}
  .est-terminada{background:#dcfce7;color:var(--verde);}

  /* VACÍO */
  .empty{text-align:center;padding:50px 20px;color:#aaa;}
  .empty h2{font-size:16px;margin-bottom:8px;color:#778;}
  .empty p{font-size:13px;}

  /* FOOTER */
  .footer-space{height:24px;}

  /* TOAST */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}

  @media(max-width:500px){
    .controls{gap:8px;}
    .stat{margin-left:0;width:100%;}
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-info">
    <div class="hdr-title">Planificación Vial · Lanús</div>
    <div class="hdr-sub">Dirección de Ejecución en Red Vial</div>
    <div class="hdr-fecha" id="hdrFecha"></div>
  </div>
</div>

<div class="controls">
  <label>Fecha</label>
  <input type="date" id="fechaSel" onchange="cargarFecha()">
  <button class="btn btn-p" onclick="irHoy()">📅 Hoy</button>
  <button class="btn btn-wa" onclick="copiarWA()">📲 Planificación</button>
  <button class="btn btn-resumen" onclick="copiarResumen()">📊 Resumen del día</button>
  <span class="stat" id="statTexto"></span>
</div>

<div id="contenido"><div class="loading">Conectando...</div></div>
<div class="footer-space"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore, collection, query, where, onSnapshot, orderBy
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiQuc-g5fNFdPUqPO1FC8xMbDyZGwn2u8",
  authDomain: "ventana-integradora.firebaseapp.com",
  projectId: "ventana-integradora",
  storageBucket: "ventana-integradora.firebasestorage.app",
  messagingSenderId: "263265819564",
  appId: "1:263265819564:web:e7e7583eb4fefe9bdff809"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Fecha ──
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtFechaLarga(iso){
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

let fechaActual = todayStr();
let entriesActuales = [];
let unsubEntries = null;

document.getElementById('fechaSel').value = fechaActual;
document.getElementById('hdrFecha').textContent = fmtFechaLarga(fechaActual);

// Cargar datos directamente sin auth
iniciarSync();

// ── Sync ──
function iniciarSync(){
  if(unsubEntries){ unsubEntries(); }
  const q = query(
    collection(db,'planificacion_entries'),
    where('fecha','==',fechaActual)
  );
  unsubEntries = onSnapshot(q, snap=>{
    entriesActuales = snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(e=>!SIN_MOSTRAR.includes(e.cuadrilla))
      .sort((a,b)=>a.cuadrilla.localeCompare(b.cuadrilla));
    renderVista();
  }, err=>{
    console.error(err);
    document.getElementById('contenido').innerHTML =
      '<div class="loading">⚠️ Sin conexión. Mostrando última versión guardada.</div>';
  });
}

function cargarFecha(){
  fechaActual = document.getElementById('fechaSel').value;
  document.getElementById('hdrFecha').textContent = fmtFechaLarga(fechaActual);
  document.getElementById('contenido').innerHTML = '<div class="loading">Cargando...</div>';
  iniciarSync();
}

function irHoy(){
  fechaActual = todayStr();
  document.getElementById('fechaSel').value = fechaActual;
  document.getElementById('hdrFecha').textContent = fmtFechaLarga(fechaActual);
  iniciarSync();
}

// ── Render ──
const ESTADO_LABEL = { pendiente:'En ejecución', incompleta:'Falta terminar', terminada:'Terminada' };

function renderVista(){
  const cont = document.getElementById('contenido');
  if(!entriesActuales.length){
    cont.innerHTML = `<div class="empty"><h2>Sin entradas para este día</h2><p>No hay trabajo planificado para el ${fmtFechaLarga(fechaActual)}.</p></div>`;
    document.getElementById('statTexto').textContent = '';
    return;
  }

  // Agrupar por cuadrilla
  const grupos = {};
  entriesActuales.forEach(e=>{
    if(!grupos[e.cuadrilla]) grupos[e.cuadrilla]=[];
    grupos[e.cuadrilla].push(e);
  });

  const total = entriesActuales.length;
  const terminadas = entriesActuales.filter(e=>(e.estado||'pendiente')==='terminada').length;
  document.getElementById('statTexto').textContent =
    `${total} trabajo${total===1?'':'s'} · ${terminadas} terminado${terminadas===1?'':'s'}`;

  cont.innerHTML = Object.entries(grupos).map(([cuadrilla, items])=>`
    <div class="cuadrilla-card">
      <div class="cuadrilla-header">
        <span class="cuadrilla-nombre">🚧 ${cuadrilla}</span>
        <span class="cuadrilla-count">${items.length} trabajo${items.length===1?'':'s'}</span>
      </div>
      ${items.map(e=>{
        const est = e.estado || (e.terminado?'terminada':'pendiente');
        return `
        <div class="entrada">
          <div class="estado-dot dot-${est}"></div>
          <div class="entrada-dir">${e.direccion}</div>
          <span class="entrada-estado est-${est}">${ESTADO_LABEL[est]||est}</span>
        </div>`;
      }).join('')}
    </div>
  `).join('') + '<div class="footer-space"></div>';
}

// ── WhatsApp ──
// Agrupación por tipo de cuadrilla
const GRUPOS_WA = [
  { label:'🚧 Bacheo',              icono:'🚧', ids:['Bacheo 1','Bacheo 2','Bacheo 3'] },
  { label:'🔩 Sellado de Juntas',   icono:'🔩', ids:['Sellado de Juntas 1','Sellado de Juntas 2'] },
  { label:'⛏️ Preparación de Suelo',icono:'⛏️', ids:['Preparación Suelo 1','Preparación Suelo 2'] },
  { label:'🧱 Albañilería',         icono:'🧱', ids:['Albañilería 1','Albañilería 2','Albañilería 3','Albañilería 4'] },
  { label:'🏗️ Terminadora',         icono:'🏗️', ids:['Terminadora'] },
  { label:'⚙️ Fresadora',           icono:'⚙️', ids:['Fresadora'] },
];

const SIN_MOSTRAR = ['Emulsion']; // solo va en el parte impreso

function tipoDeGrupo(cuadrilla){
  return GRUPOS_WA.find(g=>g.ids.includes(cuadrilla)) || { label:`🚧 ${cuadrilla}`, icono:'🚧', ids:[cuadrilla] };
}

function copiarWA(){
  if(!entriesActuales.length){ mostrarToast('No hay entradas para copiar'); return; }

  const fecha = fmtFechaLarga(fechaActual);
  const grupos = {};
  entriesActuales.forEach(e=>{
    if(!grupos[e.cuadrilla]) grupos[e.cuadrilla]=[];
    grupos[e.cuadrilla].push(e);
  });

  const total = entriesActuales.length;
  const terminadas = entriesActuales.filter(e=>(e.estado||'pendiente')==='terminada').length;
  const pendientes = entriesActuales.filter(e=>(e.estado||'pendiente')!=='terminada').length;

  let txt = `*Planificación Vial · Lanús*\n`;
  txt += `📅 ${fecha}\n`;
  txt += `━━━━━━━━━━━━━━━━\n`;

  // Sección por cuadrilla con todos los estados
  Object.entries(grupos).forEach(([cuadrilla, items])=>{
    txt += `\n*🚧 ${cuadrilla}*\n`;
    items.forEach(e=>{
      const est = e.estado || (e.terminado?'terminada':'pendiente');
      const emoji = est==='terminada'?'✅': est==='incompleta'?'⚠️':'⏳';
      txt += `${emoji} ${e.direccion}\n`;
    });
  });

  txt += `\n━━━━━━━━━━━━━━━━\n`;

  // Resumen de terminados
  if(terminadas > 0){
    txt += `\n*✅ Trabajos realizados (${terminadas})*\n`;
    entriesActuales
      .filter(e=>(e.estado||'pendiente')==='terminada')
      .forEach(e=>{ txt += `• ${e.cuadrilla}: ${e.direccion}\n`; });
    txt += '\n';
  }

  // Resumen de pendientes/incompletos
  if(pendientes > 0){
    txt += `*⏳ En ejecución (${pendientes})*\n`;
    entriesActuales
      .filter(e=>(e.estado||'pendiente')!=='terminada')
      .forEach(e=>{
        const est = e.estado||'pendiente';
        const emoji = est==='incompleta'?'⚠️':'⏳';
        txt += `${emoji} ${e.cuadrilla}: ${e.direccion}\n`;
      });
    txt += '\n';
  }

  txt += `━━━━━━━━━━━━━━━━\n`;
  txt += `Total: ${total} · ✅ ${terminadas} terminados · ⏳ ${pendientes} en ejecución`;

  navigator.clipboard.writeText(txt)
    .then(()=>mostrarToast('✓ Copiado — pegalo en WhatsApp'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      mostrarToast('✓ Copiado — pegalo en WhatsApp');
    });
}

let toastTimer;
function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function copiarResumen(){
  if(!entriesActuales.length){ mostrarToast('No hay entradas para copiar'); return; }

  const hoy = fechaActual.split('-').reverse().join('/');
  const terminados  = entriesActuales.filter(e=>(e.estado||(e.terminado?'terminada':'pendiente'))==='terminada');
  const incompletos = entriesActuales.filter(e=>(e.estado||(e.terminado?'terminada':'pendiente'))==='incompleta');
  const pendientesL = entriesActuales.filter(e=>(e.estado||(e.terminado?'terminada':'pendiente'))==='pendiente');

  function seccion(emoji, titulo, lista){
    if(!lista.length) return '';
    let s = `${emoji} *${titulo} - ${hoy}*\n`;
    s += `══════════════════════════════\n`;
    GRUPOS_WA.forEach(grupo=>{
      const items = lista.filter(e=>grupo.ids.includes(e.cuadrilla));
      if(!items.length) return;
      const nombre = grupo.label.split(' ').slice(1).join(' ').toUpperCase();
      s += `\n*${nombre}*\n`;
      items.forEach(e=>{ s += `✓ ${e.direccion}\n`; });
    });
    // Cuadrillas no agrupadas
    const extras = [...new Set(lista.map(e=>e.cuadrilla).filter(c=>!GRUPOS_WA.some(g=>g.ids.includes(c))))];
    extras.forEach(c=>{
      s += `\n*${c.toUpperCase()}*\n`;
      lista.filter(e=>e.cuadrilla===c).forEach(e=>{ s += `✓ ${e.direccion}\n`; });
    });
    return s + '\n';
  }

  let txt = '';
  txt += seccion('✅', 'TRABAJOS TERMINADOS', terminados);
  txt += seccion('⚠️', 'FALTA TERMINAR', incompletos);
  txt += seccion('⏳', 'TRABAJOS PENDIENTES', pendientesL);

  const total = entriesActuales.length;
  txt += `──────────────────────────────\n`;
  txt += `Total: ${total} · ✅ ${terminados.length} · ⚠️ ${incompletos.length} · ⏳ ${pendientesL.length}`;

  if(!txt.trim()){ mostrarToast('No hay datos para copiar'); return; }

  navigator.clipboard.writeText(txt)
    .then(()=>mostrarToast('✓ Resumen copiado — pegalo en WhatsApp'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      mostrarToast('✓ Resumen copiado — pegalo en WhatsApp');
    });
}

Object.assign(window,{cargarFecha,irHoy,copiarWA,copiarResumen});
</script>
</body>
</html>
