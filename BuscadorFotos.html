<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Fotos Rápida</title>
<style>
  :root{
    --azul:#1a3a5c;--azul-m:#2c5f8a;--azul-c:#d6e8f7;
    --verde:#2d6a4f;--naranja:#e07b2a;--gris:#f4f6f9;
    --borde:#c8d4e0;--texto:#1a2533;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:var(--gris);
    color:var(--texto);
    font-size:14px;
    min-height:100vh;
    padding-bottom:40px;
  }
  .hdr{
    background:#fff;
    color:var(--texto);
    padding:13px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    position:sticky;
    top:0;
    z-index:200;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    border-bottom:3px solid var(--naranja);
  }
  .hdr h1{
    font-size:15px;
    font-weight:700;
    color:var(--azul);
  }
  .hdr p{
    font-size:11px;
    color:#667;
    margin-top:2px;
  }
  .hdr-logo{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .hdr-logo img{
    height:52px;
    width:auto;
    flex-shrink:0;
  }
  .hdr-date{
    background:var(--azul-c);
    color:var(--azul);
    border-radius:6px;
    padding:5px 12px;
    font-size:13px;
    font-weight:600;
  }

  .content{
    padding:18px;
    max-width:1200px;
    margin:0 auto;
  }

  .card{
    background:#fff;
    border-radius:8px;
    border:1px solid var(--borde);
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 1px 4px rgba(0,0,0,.05);
  }
  .card-title{
    font-size:12px;
    font-weight:700;
    color:var(--azul);
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:12px;
    padding-bottom:7px;
    border-bottom:2px solid var(--azul-c);
    display:flex;
    align-items:center;
    gap:7px;
  }

  .input-busqueda-cont{
    position:relative;
    margin-bottom:14px;
  }
  .input-busqueda-cont svg{
    position:absolute;
    left:9px;
    top:50%;
    transform:translateY(-50%);
    stroke:#667;
    pointer-events:none;
  }
  input#busqueda{
    width:100%;
    background:#fff;
    border:1px solid var(--borde);
    color:var(--texto);
    padding:7px 9px 7px 35px;
    border-radius:5px;
    font-size:13px;
    outline:none;
    transition:border-color .15s;
  }
  input#busqueda:focus{
    outline:none;
    border-color:var(--azul-m);
    box-shadow:0 0 0 3px rgba(44,95,138,.12);
  }
  input#busqueda::placeholder{color:#aaa;}

  .info-linea{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#667;
    font-size:12px;
    margin-bottom:14px;
    padding:0 2px;
  }
  .info-linea b{color:var(--azul);}

  .grid-fotos{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:12px;
  }

  .foto-card{
    background:#fff;
    border:1px solid var(--borde);
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .12s, border-color .12s, box-shadow .12s;
    box-shadow:0 1px 4px rgba(0,0,0,.05);
  }
  .foto-card:active{transform:scale(0.97);}
  .foto-card:hover{
    border-color:var(--azul);
    box-shadow:0 2px 8px rgba(26,58,92,.15);
  }
  .foto-thumb{
    width:100%;
    aspect-ratio:4/3;
    background:#f0f3f7;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-size:12px;
    position:relative;
  }
  .foto-thumb svg{opacity:0.35; width:34px; height:34px; stroke:#aaa;}
  .foto-info{padding:9px 10px 11px;}
  .foto-direccion{
    font-size:12px;
    font-weight:600;
    color:var(--azul);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .foto-meta{
    font-size:11px;
    color:#667;
    margin-top:3px;
    display:flex;
    justify-content:space-between;
    gap:6px;
  }
  .tag-tipo{
    display:inline-block;
    background:#fef3c7;
    color:#92400e;
    font-size:10px;
    font-weight:700;
    padding:2px 6px;
    border-radius:4px;
    margin-top:5px;
  }

  .sin-resultados{
    text-align:center;
    padding:60px 20px;
    color:#667;
  }
  .sin-resultados svg{opacity:0.3; margin-bottom:14px; stroke:#aaa;}
  .sin-resultados p{font-size:13px;}

  /* Modal */
  .modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:5000;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .modal.activo{display:flex;}
  .modal-content{
    max-width:100%;
    max-height:80vh;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
  }
  .modal-img{
    width:100%;
    max-height:60vh;
    background:#f0f3f7;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    flex-direction:column;
    gap:10px;
    padding:40px;
    border-bottom:1px solid var(--borde);
  }
  .modal-img svg{stroke:#aaa;}
  .modal-footer{
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .modal-footer div b{display:block; font-size:14px; color:var(--azul); font-weight:600;}
  .modal-footer div span{font-size:12px; color:#667;}
  .btn-cerrar{
    background:none;
    color:var(--azul);
    border:1.5px solid var(--borde);
    width:32px;
    height:32px;
    border-radius:50%;
    font-size:16px;
    cursor:pointer;
    transition:.15s;
  }
  .btn-cerrar:hover{
    border-color:var(--azul);
    background:var(--azul-c);
  }
</style>
</head>

        <b id="modalDireccion">-</b>
        <span id="modalDetalle">-</span>
      </div>

    </div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURACIÓN — pegá tu API key acá
// ═══════════════════════════════════════════════
const API_KEY   = "PEGAR_ACA_TU_KEY";
const FOLDER_ID = "1DZEHgnqF1utFl8jxHUL1mUncvlDFrEVJ";

let registros = [];      // todas las fotos de la carpeta
let listaActual = [];

// ---------- Utilidades ----------
function normalizar(texto){
  return (texto||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Interpreta el nombre del archivo: Direccion_TipoObra_Momento_DD-MM-YYYY.jpg
function parsearNombre(nombre){
  const sinExt = nombre.replace(/\.[^.]+$/, '');
  const partes = sinExt.split('_');
  return {
    direccion: partes[0] || sinExt,
    tipo:      partes[1] || '',
    momento:   partes[2] || '',
    fecha:     partes[3] || ''
  };
}

// ---------- Carga inicial desde Drive ----------
async function cargarFotos(){
  const estado = document.getElementById('hdrEstado');
  const contador = document.getElementById('contador');
  try{
    let todas = [];
    let pageToken = '';
    do{
      const q = encodeURIComponent(`'${FOLDER_ID}' in parents and trashed=false and mimeType contains 'image/'`);
      let url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=nextPageToken,files(id,name,createdTime)&pageSize=1000&key=${API_KEY}`;
      if(pageToken) url += `&pageToken=${pageToken}`;
      const resp = await fetch(url);
      if(!resp.ok){
        const err = await resp.json().catch(()=>({}));
        throw new Error(err.error?.message || `Error ${resp.status}`);
      }
      const data = await resp.json();
      todas = todas.concat(data.files || []);
      pageToken = data.nextPageToken || '';
    }while(pageToken);

    registros = todas.map(f => {
      const p = parsearNombre(f.name);
      return { id: f.id, nombre: f.name, creado: f.createdTime || '', ...p };
    });

    // Más recientes primero (por fecha del nombre si se puede)
    registros.sort((a,b) => (b.creado||'').localeCompare(a.creado||''));

    estado.textContent = `${registros.length} fotos`;
    estado.style.background = '#d1fae5';
    estado.style.color = '#065f46';
    listaActual = registros;
    renderResultados(registros);
  }catch(e){
    estado.textContent = 'Sin conexión';
    estado.style.background = '#fee2e2';
    estado.style.color = '#991b1b';
    contador.innerHTML = '';
    document.getElementById('grid').innerHTML =
      `<div style="grid-column:1/-1;background:#fff;border:1px solid #fecaca;border-radius:8px;padding:16px;color:#991b1b;font-size:13px;">
        ⚠️ No se pudieron cargar las fotos de Drive.<br>
        <span style="color:#667;font-size:12px;">${e.message}</span><br><br>
        <span style="color:#667;font-size:12px;">Verificá: 1) la API key esté pegada en el código, 2) la carpeta esté compartida como "Cualquiera con el enlace", 3) estés entrando desde el sitio de GitHub Pages (la key está restringida a ese dominio).</span>
      </div>`;
  }
}

// ---------- Búsqueda ----------
function buscarFotos(termino){
  if(!termino.trim()) return registros;
  const t = normalizar(termino);
  return registros.filter(r => normalizar(r.nombre).includes(t));
}

// ---------- Agrupar por dirección ----------
let gruposActuales = [];

function agruparPorDireccion(lista){
  const mapa = {};
  lista.forEach(r => {
    const clave = normalizar(r.direccion);
    if(!mapa[clave]) mapa[clave] = { direccion: r.direccion, fotos: [] };
    mapa[clave].fotos.push(r);
  });
  return Object.values(mapa);
}

// ---------- Render ----------
function renderResultados(lista){
  const grid = document.getElementById('grid');
  const sinResultados = document.getElementById('sinResultados');
  const contador = document.getElementById('contador');

  gruposActuales = agruparPorDireccion(lista);

  contador.innerHTML = `Mostrando <b>${gruposActuales.length}</b> direccion${gruposActuales.length===1?'':'es'} (${lista.length} foto${lista.length===1?'':'s'})`;

  if(gruposActuales.length === 0){
    grid.innerHTML = '';
    sinResultados.style.display = 'block';
    return;
  }
  sinResultados.style.display = 'none';

  grid.innerHTML = gruposActuales.map((g, i) => {
    const momentos = [...new Set(g.fotos.map(f => normalizar(f.momento)).filter(Boolean))];
    const soloDespues = momentos.length === 1 && momentos[0] === 'despues';
    const fechas = [...new Set(g.fotos.map(f => f.fecha).filter(Boolean))];
    const tipos = [...new Set(g.fotos.map(f => f.tipo).filter(Boolean))];
    return `
    <div class="foto-card" onclick="abrirModal(${i})">
      <div class="foto-thumb">
        <img src="https://drive.google.com/thumbnail?id=${g.fotos[0].id}&sz=w400"
             loading="lazy" alt="${g.direccion}"
             style="width:100%;height:100%;object-fit:cover;"
             onerror="this.style.display='none'">
        <span style="position:absolute;bottom:5px;right:5px;background:rgba(26,58,92,.85);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;">${g.fotos.length} 📷</span>
      </div>
      <div class="foto-info">
        <div class="foto-direccion">${g.direccion}</div>
        <div class="foto-meta">
          ${fechas.length ? `<span style="font-weight:700;color:var(--azul);">📅 ${fechas.length===1 ? fechas[0] : fechas.length+' fechas'}</span>` : '<span></span>'}
        </div>
        ${soloDespues ? `<span class="tag-tipo" style="background:#fee2e2;color:#991b1b;">⚠️ Solo Después — falta Antes</span>` : ''}
        ${tipos.length ? `<span class="tag-tipo">${tipos.join(', ')}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ---------- Modal (galería por dirección) ----------
function abrirModal(idx){
  const g = gruposActuales[idx];
  document.getElementById('modalImg').innerHTML = g.fotos.map(r => `
    <div style="width:100%;">
      <img src="https://drive.google.com/thumbnail?id=${r.id}&sz=w1600"
           loading="lazy" alt="${r.direccion}"
           style="width:100%;max-height:55vh;object-fit:contain;background:#f0f3f7;">
      <div style="padding:6px 4px 12px;font-size:12px;color:#667;text-align:center;">
        ${[r.momento, r.tipo, r.fecha].filter(Boolean).join(' · ') || r.nombre}
      </div>
    </div>
  `).join('');
  document.getElementById('modalDireccion').textContent = g.direccion;
  document.getElementById('modalDetalle').textContent = `${g.fotos.length} foto${g.fotos.length===1?'':'s'}`;
  document.getElementById('modal').classList.add('activo');
}
function cerrarModal(){
  document.getElementById('modal').classList.remove('activo');
}

// ---------- Eventos ----------
document.getElementById('busqueda').addEventListener('input', (e) => {
  listaActual = buscarFotos(e.target.value);
  renderResultados(listaActual);
});

document.getElementById('modal').addEventListener('click', (e) => {
  if(e.target.id === 'modal') cerrarModal();
});

// Arranque
cargarFotos();
</script>

  };
  function ppSetEstado(e){ document.getElementById('ppCara').src = PP_CARAS[e]; }
  ppSetEstado('reposo');

  let ppYaSaludo = false;
  function ppPosicionarPanel(){
    const btn = document.getElementById('ppBtn');
    const panel = document.getElementById('ppPanel');
    const r = btn.getBoundingClientRect();
    const panelW = Math.min(380, window.innerWidth - 32);
    const panelH = 340;
    let left = r.left + r.width/2 - panelW/2;
    left = Math.max(16, Math.min(left, window.innerWidth - panelW - 16));
    let top = (r.top > panelH + 20) ? (r.top - panelH - 10) : (r.bottom + 10);
    top = Math.max(10, Math.min(top, window.innerHeight - 60));
    panel.style.left = left+'px'; panel.style.top = top+'px';
  }
  function ppToggle(){
    const panel = document.getElementById('ppPanel');
    const abriendo = !panel.classList.contains('open');
    if(abriendo) ppPosicionarPanel();
    panel.classList.toggle('open');
    if(abriendo) ppSaludar();
  }
  document.getElementById('ppBtn').addEventListener('click', function(){
    if(this.dataset.bloquearClick) return;
    ppToggle();
  });

  function ppSaludo(){
    const h = new Date().getHours();
    if(h < 12) return 'Buen día';
    if(h < 19) return 'Buenas tardes';
    return 'Buenas noches';
  }
  function ppSaludar(){
    if(ppYaSaludo) return;
    ppYaSaludo = true;
    ppSetEstado('contento');
    ppLog(true, `${ppSaludo()} 👋`, 'Soy PlaniPinza. Decime qué fotos buscás (calle, tipo de obra, antes/después, fechas) y te las filtro al toque.');
    setTimeout(()=>ppSetEstado('reposo'), 2200);
  }

  (function(){
    const btn = document.getElementById('ppBtn');
    let arrastrando=false, movio=false, offX=0, offY=0;
    function iniciar(x,y){
      const r=btn.getBoundingClientRect();
      offX=x-r.left; offY=y-r.top; arrastrando=true; movio=false;
      btn.classList.add('arrastrando');
      btn.style.left=r.left+'px'; btn.style.top=r.top+'px';
      btn.style.right='auto'; btn.style.bottom='auto';
    }
    function mover(x,y){
      if(!arrastrando) return;
      movio=true;
      let left=x-offX, top=y-offY;
      const w=btn.offsetWidth, h=btn.offsetHeight;
      left=Math.max(4,Math.min(left, window.innerWidth-w-4));
      top=Math.max(4,Math.min(top, window.innerHeight-h-4));
      btn.style.left=left+'px'; btn.style.top=top+'px';
    }
    btn.addEventListener('pointerdown', e=>{ btn.setPointerCapture(e.pointerId); iniciar(e.clientX,e.clientY); });
    btn.addEventListener('pointermove', e=>{ mover(e.clientX,e.clientY); });
    btn.addEventListener('pointerup', ()=>{
      arrastrando=false; btn.classList.remove('arrastrando');
      if(movio){ btn.dataset.bloquearClick='1'; setTimeout(()=>{ delete btn.dataset.bloquearClick; },50); }
    });
  })();

  function ppLog(ok, texto, detalle){
    const div = document.getElementById('ppLog');
    const el = document.createElement('div');
    el.className = 'pp-msg ' + (ok?'ok':'err');
    el.innerHTML = `${texto}${detalle?`<small>${detalle}</small>`:''}`;
    div.prepend(el);
    return el;
  }

  function ppNorm(s){ return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
  const PP_MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  // convierte "05-07-2026" (formato del nombre de archivo) a "2026-07-05"
  function ppFechaFilaISO(fechaStr){
    const p = (fechaStr||'').split('-');
    if(p.length!==3) return null;
    return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  }

  function ppExtraerFechas(raw){
    const low = raw.toLowerCase();
    const fechas = [...raw.matchAll(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/g)];
    if(fechas.length>=2){
      const nrm = m => { const yy=m[3]?(m[3].length===2?'20'+m[3]:m[3]):new Date().getFullYear(); return `${yy}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; };
      return { desde: nrm(fechas[0]), hasta: nrm(fechas[1]) };
    }
    if(fechas.length===1){
      const m = fechas[0];
      const yy = m[3]?(m[3].length===2?'20'+m[3]:m[3]):new Date().getFullYear();
      const f = `${yy}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      return { desde: f, hasta: f };
    }
    const mesMatch = PP_MESES.find(m=>ppNorm(low).includes(ppNorm(m)));
    if(mesMatch){
      const mIdx = PP_MESES.indexOf(mesMatch)+1;
      const anioMatch = raw.match(/\b(20\d{2})\b/);
      const anio = anioMatch ? anioMatch[1] : new Date().getFullYear();
      const desde = `${anio}-${String(mIdx).padStart(2,'0')}-01`;
      const ultimoDia = new Date(anio, mIdx, 0).getDate();
      const hasta = `${anio}-${String(mIdx).padStart(2,'0')}-${ultimoDia}`;
      return { desde, hasta };
    }
    if(/\bhoy\b/.test(low)){
      const f = new Date().toISOString().slice(0,10);
      return { desde:f, hasta:f };
    }
    return {};
  }

  function ppProcesar(){
    const raw = document.getElementById('ppCmd').value.trim();
    if(!raw) return;
    document.getElementById('ppCmd').value = '';
    ppSetEstado('pensando');
    setTimeout(()=>ppEjecutar(raw), 500);
  }
  window.ppProcesar = ppProcesar;

  function ppEjecutar(raw){
    const low = raw.toLowerCase();

    if(/mostrame todo|ver todo|limpiar|sacar filtros|borrar filtros/.test(low)){
      document.getElementById('busqueda').value = '';
      listaActual = registros;
      renderResultados(registros);
      ppSetEstado('contento');
      ppLog(true, `🧹 Mostrando todas las fotos.`, `${registros.length} en total.`);
      setTimeout(()=>ppSetEstado('reposo'), 2200);
      return;
    }

    if(registros.length === 0){
      ppSetEstado('confundido');
      ppLog(false, '⚠️ Todavía no terminaron de cargar las fotos desde Drive. Esperá un segundo y probá de nuevo.');
      setTimeout(()=>ppSetEstado('reposo'), 2200);
      return;
    }

    const {desde, hasta} = ppExtraerFechas(raw);
    let momento = null;
    if(/\bantes\b/.test(low)) momento='antes';
    if(/\bdespues\b|\bdespu[eé]s\b/.test(low)) momento='despues';

    let t = ' ' + low + ' ';
    t = t.replace(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/g,' ');
    PP_MESES.forEach(m=>{ t = t.replace(new RegExp('\\b'+m+'\\b','gi'),' '); });
    t = t.replace(/\b(antes|despues|después|mostrame|mostra|busca|buscá|buscame|ver|fotos?|foto|de|del|el|la|los|las|en|hoy|este|mes|desde|hasta|al|todo)\b/gi,' ');
    t = ppNorm(t).replace(/\s+/g,' ').trim();
    const palabras = t ? t.split(' ').filter(Boolean) : [];

    if(!momento && !desde && !palabras.length){
      ppSetEstado('confundido');
      ppLog(false, '🤔 No pude identificar qué buscar.', 'Probá con una calle, tipo de obra, "antes"/"después", o una fecha. Ej: "fotos de bacheo en Achaval de julio".');
      setTimeout(()=>ppSetEstado('reposo'), 2200);
      return;
    }

    const resultados = registros.filter(r=>{
      if(momento && ppNorm(r.momento) !== momento) return false;
      if(desde || hasta){
        const iso = ppFechaFilaISO(r.fecha);
        if(!iso) return false;
        if(desde && iso < desde) return false;
        if(hasta && iso > hasta) return false;
      }
      if(palabras.length){
        const campos = ppNorm(r.direccion) + ' ' + ppNorm(r.tipo) + ' ' + ppNorm(r.nombre);
        return palabras.every(p => campos.includes(p));
      }
      return true;
    });

    listaActual = resultados;
    renderResultados(resultados);
    ppSetEstado('contento');
    const partes = [];
    if(palabras.length) partes.push(`"${palabras.join(' ')}"`);
    if(momento) partes.push(momento==='antes'?'Antes':'Después');
    if(desde && hasta && desde!==hasta) partes.push(`${desde.split('-').reverse().join('/')} al ${hasta.split('-').reverse().join('/')}`);
    else if(desde) partes.push(desde.split('-').reverse().join('/'));
    const nDirecciones = new Set(resultados.map(r=>ppNorm(r.direccion))).size;
    ppLog(true, `🔍 Filtrado por: ${partes.join(' · ')}`, `${resultados.length} foto${resultados.length!==1?'s':''} en ${nDirecciones} direcci${nDirecciones!==1?'ones':'ón'}.`);
    setTimeout(()=>ppSetEstado('reposo'), 2200);
  }

})();
